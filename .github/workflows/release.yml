name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    steps:
      # Reads release-please-config.json + .release-please-manifest.json.
      # On a normal push: opens/updates the "chore: release X.Y.Z" PR that bumps
      # package.json, plugin.json, and marketplace.json and regenerates CHANGELOG.md.
      # When that PR is merged: creates the vX.Y.Z tag and the GitHub Release.
      #
      # If the org disables "Allow GitHub Actions to create and approve pull requests",
      # the default GITHUB_TOKEN cannot open the release PR. Provide a PAT (classic
      # `repo` scope, or fine-grained with Contents + Pull requests: write) as the
      # RELEASE_PLEASE_TOKEN repo secret. The expression falls back to GITHUB_TOKEN so
      # the workflow still parses if the secret is absent (it just won't open the PR).
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
